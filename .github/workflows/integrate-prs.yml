name: Integrate PRs

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'prs.yml'
      - '.github/workflows/integrate-prs.yml'
      - 'scripts/integrate-prs.sh'
      - 'scripts/report-status.sh'

permissions:
  contents: write
  issues: write
  pull-requests: read

concurrency:
  group: integrate-prs
  cancel-in-progress: false

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          if ! command -v yq >/dev/null 2>&1; then
            sudo wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi
          yq --version

      - name: Configure git identity
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/helix-editor/helix.git
          git fetch upstream master --no-tags
          # Fetch existing nightly so --force-with-lease has a baseline to compare.
          git fetch origin nightly --no-tags || true

      - name: Build nightly branch
        id: integrate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/integrate-prs.sh

      - name: Push nightly branch
        run: git push --force-with-lease origin nightly

      - name: Report status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGED:  ${{ steps.integrate.outputs.merged }}
          SKIPPED: ${{ steps.integrate.outputs.skipped }}
        run: bash scripts/report-status.sh
